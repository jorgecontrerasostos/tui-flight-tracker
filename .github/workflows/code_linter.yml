name: "Code Linter"

on:
  pull_request:
    branches:
      - "main"

jobs:
  python-linter:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - run: uv run ruff check src/
