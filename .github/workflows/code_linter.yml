name: "Code Linter"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  python-linter:
    name: Python Linter
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v7
      - run: | 
          uv sync
          uv run ruff check src/
          uv run ruff format --check src/

  type-checker:
    name: Type Checker
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v7
      - run: | 
          uv sync
          uv run mypy src/